<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>Kontakte</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background:#111;
  color:#fff;
}

.card {
  background:#1a1a1a;
  border:none;
  border-radius:12px;
  color:#fff;
}

.text-secondary {
  color:#ccc !important;
}

pre {
  background:#222;
  color:#fff;
  padding:10px;
  border-radius:8px;
}

/* Buttons sauber */
.btn-outline-light {
  color:#fff;
  border-color:#fff;
}

.btn-outline-light:hover {
  background:#fff;
  color:#000;
}
</style>
</head>

<body>

<div class="container py-5">

<h2 class="mb-4">📇 Kontakte</h2>

{% for k in kontakte %}
<div class="card mb-3 p-3">

  <div class="d-flex justify-content-between">
    <strong>{{ k.name or "Unbekannt" }}</strong>
    <span class="text-secondary">{{ k.status }}</span>
  </div>

    <p class="mb-1">📍 {{ k.ort or "-" }}</p>
    <p class="mb-1">✉️ {{ k.email or "-" }}</p>
    <p class="mb-1">📞 {{ k.telefon or "-" }}</p>

  <button class="btn btn-outline-light btn-sm mt-2">
          onclick="toggleDetails('{{ k.id }}')"
    Details
  </button>

  <div id="details-{{ k.id }}" style="display:none;" class="mt-3">
    
    <pre style="white-space: pre-wrap;">
        {{ k.raw_data }}
    </pre>
    
  </div>

</div>
{% endfor %}

</div>

<script>
function toggleDetails(id) {
  const el = document.getElementById("details-" + id);
  el.style.display = el.style.display === "none" ? "block" : "none";
}
</script>

</body>
</html>
