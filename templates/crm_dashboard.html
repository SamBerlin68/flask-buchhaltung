{% extends 'base.html' %}

{% block content %}
<div class="container py-5">

  <h1 class="mb-4">🧠 CRM</h1>

<div class="row g-4">

  <div class="col-md-3">
    <a href="{{ url_for('kunden.kunden_liste', filter='kunden') }}"
       class="text-decoration-none">
      <div class="card p-4 text-center h-100 border-success">
        <h2>{{ kunden }}</h2>
        <p class="text-success mb-0">Aktive Kunden</p>
      </div>
    </a>
  </div>

  <div class="col-md-3">
    <a href="{{ url_for('kunden.kunden_liste', filter='interessenten') }}"
       class="text-decoration-none">
      <div class="card p-4 text-center h-100">
        <h2>{{ interessenten }}</h2>
        <p class="text-secondary mb-0">Interessenten</p>
      </div>
    </a>
  </div>

  <div class="col-md-3">
    <a href="{{ url_for('kunden.kunden_liste', filter='offen') }}"
       class="text-decoration-none">
      <div class="card p-4 text-center h-100 border-warning">
        <h2>{{ offene_aufgaben }}</h2>
        <p class="text-warning mb-0">Offene Aufgaben</p>
      </div>
    </a>
  </div>

  <div class="col-md-3">
    <a href="{{ url_for('kunden.kunden_liste', filter='ueberfaellig') }}"
       class="text-decoration-none">

        <div class="card p-4 text-center h-100 border-danger">

            <h2>{{ ueberfaellige_aufgaben }}</h2>

            <p class="text-danger mb-0">
                Überfällige Aufgaben
            </p>

        </div>

    </a>
</div>

</div>

  <div class="row mt-4 g-3">

    <div class="col-md-6">
      <a href="{{ url_for('crm.newsletter_liste') }}"
         class="btn btn-outline-warning w-100">
        📬 Newsletterliste
      </a>
    </div>

    <div class="col-md-6">
      <a href="{{ url_for('kunden.kunden_liste') }}"
         class="btn btn-outline-light w-100">
        📇 Kontakte verwalten
      </a>
    </div>

    <div class="col-md-6">
      <a href="{{ url_for('kunden.kunden_liste') }}"
         class="btn btn-success w-100">
        🧑‍💼 Kundenliste
      </a>
    </div>

  </div>

</div>
{% endblock %}
