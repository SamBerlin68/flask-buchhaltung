{% extends 'base.html' %}
{% block content %}
<div class="container py-4">
  <h1 class="mb-4">Dashboard</h1>

  <div class="row g-3">

    <div class="col-12 col-md-6 col-lg-3">
      <a class="btn btn-primary w-100" href="{{ url_for('konto.konten') }}">
        Kontoverwaltung
      </a>
    </div>

    <div class="col-12 col-md-6 col-lg-3">
      <a class="btn btn-secondary w-100" href="{{ url_for('buchung.buchungen_liste') }}">
        Buchungen
      </a>
    </div>

    <div class="col-12 col-md-6 col-lg-3">
      <a class="btn btn-outline-primary w-100" href="{{ url_for('zuordnung.zuordnen') }}">
        Zuordnung
      </a>
    </div>

    <!-- 🔥 Neuer Button -->
    <div class="col-12 col-md-6 col-lg-3">
      <a class="btn btn-warning w-100" href="{{ url_for('report.ustva') }}">
        USt-Voranmeldung
      </a>
    </div>
    <div class="col-12 col-md-6 col-lg-3">
      <a class="btn btn-success w-100" href="{{ url_for('report.bwa') }}">
        📊 BWA
      </a>
    </div>
    <div class="col-md-3 mb-3">
      <a class="btn btn-dark w-100" href="{{ url_for('crm.dashboard') }}">
      🧠 CRM
      </a>
    </div>

    <!-- 🟡 Zuordnungsdaten löschen sauber im Grid -->
    <div class="col-12 col-md-6 col-lg-3">
      <form method="post" action="{{ url_for('zuordnung.zuordnung_loeschen') }}"
        onsubmit="return confirm('Nur Zuordnungsdaten (offene Importe) löschen? Buchungen bleiben erhalten.');">
        <button class="btn btn-outline-warning w-100">
          Zuordnungsdaten löschen
        </button>
      </form>
    </div>

  </div>
</div>
{% endblock %}
