{% extends "base.html" %}
{% block content %}

<h2>➕ Manuelle Buchung</h2>

<form method="post" class="mt-3">
  <div class="mb-2">
    <label>Datum</label>
    <input type="date" name="datum" class="form-control" required>
  </div>

  <div class="mb-2">
    <label>Empfänger</label>
    <input type="text" name="empfaenger" class="form-control">
  </div>

  <div class="mb-2">
    <label>Verwendungszweck</label>
    <input type="text" name="verwendungszweck" class="form-control">
  </div>

  <div class="mb-2">
    <label>Konto</label>
    <select name="konto_id" class="form-select" required>
      {% for k in konten %}
        <option value="{{ k.id }}">{{ k.name }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="mb-2">
    <label>Betrag (Netto)</label>
    <input type="number" step="0.01" name="betrag_netto" class="form-control" required>
  </div>

  <div class="mb-2">
    <label>Steuersatz</label>
    <select name="steuersatz" class="form-select">
      <option value="0">0 %</option>
      <option value="7">7 %</option>
      <option value="19">19 %</option>
    </select>
  </div>

  <div class="mb-2">
    <label>Belegnummer</label>
    <input type="text" name="belegnummer" class="form-control">
  </div>

  <button class="btn btn-primary mt-3">Buchen</button>
</form>

{% endblock %}
