{% extends 'base.html' %}

{% block content %}
 <style>
/* 🔍 SAM Search Bar */


</style>

<div class="container py-5">

  <h1 class="mb-4">📬 Newsletterliste</h1>
  <div class="mb-3 text-end">
  <a href="{{ url_for('crm.newsletter_neu') }}"
     class="btn btn-success">
    ➕ Neuer Eintrag
  </a>
</div>
  <!-- 🔍 Suchfeld -->
<form method="get" class="mb-4">

  <div class="search-wrapper">

    <span class="search-icon">🔍</span>

    <input type="text"
           name="search"
           value="{{ search }}"
           class="search-input"
           placeholder="Suche nach Name, Email oder Ort">

    <button class="search-btn">
      Suchen
    </button>

  </div>

</form>

  {% for k in kontakte %}
  <div class="card mb-3 p-3">

    <div class="d-flex justify-content-between">
      <strong>{{ k.name or "Unbekannt" }}</strong>
      <span class="text-secondary">{{ k.ort }}</span>
    </div>

    <p class="mb-1">✉️ {{ k.email }}</p>
    <p class="mb-1">📞 {{ k.telefon or "-" }}</p>
  <div class="mt-2">

  <a href="{{ url_for('crm.newsletter_bearbeiten', kontakt_id=k.id) }}"
     class="btn btn-sm btn-outline-light">
    ✏️ Bearbeiten
  </a>

  <a href="{{ url_for('crm.newsletter_loeschen', kontakt_id=k.id) }}"
     class="btn btn-sm btn-outline-danger"
     onclick="return confirm('Wirklich löschen?');">
    🗑 Löschen
  </a>

</div>

</div>

  {% endfor %}

</div>
{% endblock %}
