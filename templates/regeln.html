<!-- templates/regeln.html -->
{% extends 'base.html' %}
{% block title %}Regeln{% endblock %}
{% block content %}
<div class="row g-4">
  <div class="col-12 col-lg-7">
    <h2 class="h5">Regeln</h2>
    <table class="table table-sm table-striped">
      <thead>
        <tr>
          <th>Suchbegriff</th>
          <th>Konto</th>
          <th>Steuersatz</th>
          <th class="text-end">Aktionen</th>
        </tr>
      </thead>
      <tbody>
        {% for r in regeln %}
        <tr>
          <td>{{ r.suchbegriff }}</td>
          <td>{{ r.konto }}</td>
          <td>{{ r.steuersatz }}%</td>
          <td class="text-end">
            <a class="btn btn-sm btn-outline-primary"
              href="{{ url_for('regel.regel_bearbeiten', regel_id=r.id) }}">Bearbeiten</a>
            <form class="d-inline" method="post" action="{{ url_for('regel.regel_loeschen', regel_id=r.id) }}"
              onsubmit="return confirm('Regel wirklich löschen?');">
              <button class="btn btn-sm btn-outline-danger">Löschen</button>
            </form>
          </td>
        </tr>
        {% else %}
        <tr>
          <td colspan="4" class="text-muted">Noch keine Regeln angelegt.</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
  <div class="col-12 col-lg-5">
    <h2 class="h5">Neue Regel</h2>
    <form method="post">
      <div class="mb-3">
        <label class="form-label required">Suchbegriff</label>
        <input type="text" class="form-control" name="suchbegriff" required>
      </div>
      <div class="mb-3">
        <label class="form-label required">Konto</label>
        <select class="form-select" name="konto_id" required>
          <option value="">Bitte wählen…</option>
          {% for k in konten %}
          <option value="{{ k.id }}">{{ k.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Steuersatz (%)</label>
        <select class="form-select" name="steuersatz" required>
          {% for opt in [0, 7, 19] %}
          <option value="{{ opt }}" {% if opt==19 %}selected{% endif %}>{{ opt }} %</option>
          {% endfor %}
        </select>
      </div>
      <button class="btn btn-primary">Speichern</button>
    </form>
  </div>
</div>
{% endblock %}
